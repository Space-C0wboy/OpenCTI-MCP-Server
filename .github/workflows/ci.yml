name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv venv --python ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev]"
      - run: uv run ruff check .
      - run: uv run pytest -q
